# Used by the `parts/favicons.php` snippet

label:
  en: Site icon
  de: Seiten-Icon
type: files
uploads: svg
multiple: false
layout: cardlets
image:
  back: transparent
width: 1/2
help:
  en: |
    Upload a single SVG file. The system automatically generates all required icon sizes from it (browser tab, Apple Touch Icon, etc.). The SVG should be square.
  de: |
    Lade eine einzelne SVG-Datei hoch. Das System generiert daraus automatisch alle benötigten Icon-Grössen (Browser-Tab, Apple Touch Icon, etc.). Die SVG sollte quadratisch sein.